[pytest]
testpaths = tests
addopts = -m "not benchmark"
markers =
    unit: fast, isolated tests of a single function or class
    integration: tests crossing module boundaries with real dependencies
    e2e: full pipeline end-to-end tests
    benchmark: forward-pass timing; run via -m benchmark (skipped by default)
    exploratory: signal-watching tests not run in the per-round gate; invoke via -m exploratory
